<div class="auth-container">
  <div class="auth-card">
    <p-toast position="top-center"></p-toast>

    <div class="auth-header">
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate class="auth-form">
      <div class="form-group">
        <label for="username" class="form-label">Email</label>
        <input
          id="username"
          type="email"
          formControlName="username"
          placeholder="usuario@ejemplo.com"
          class="form-input"
        />
        <div class="error" *ngIf="f['username'].touched && f['username'].invalid">
          <small *ngIf="f['username'].errors?.['required']">Email is required.</small>
          <small *ngIf="f['username'].errors?.['email']">Invalid email format.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="form-input"
        />
        <div class="error" *ngIf="f['password'].touched && f['password'].invalid">
          <small *ngIf="f['password'].errors?.['required']">Password is required.</small>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <p-button
        type="submit"
        label="Sign In"
        icon="pi pi-sign-in"
        class="auth-button"
        [disabled]="loginForm.invalid"
      ></p-button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register" class="auth-link">Sign up</a></p>
    </div>
  </div>
</div>
