<div class="page-wrapper">
  <div class="login-column">
    <p-toast position="top-center"></p-toast>
    
    <h2 class="form-title">Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="username">Email</label>
        <input
          id="username"
          type="email"
          formControlName="username"
          placeholder="usuario@ejemplo.com"
        />
        <div class="error" *ngIf="f['username'].touched && f['username'].invalid">
          <small *ngIf="f['username'].errors?.['required']">El usuario es obligatorio.</small>
          <small *ngIf="f['username'].errors?.['email']">Formato de email inválido.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
        />
        <div class="error" *ngIf="f['password'].touched && f['password'].invalid">
          <small *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria.</small>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

      <p-button
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        class="w-full"
        [disabled]="loginForm.invalid"
      ></p-button>
    </form>

    <div class="form-footer">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </div>
  </div>
</div>
