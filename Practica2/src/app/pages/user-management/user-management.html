<div class="dashboard-container">
  <!-- Sidebar -->
  <div class="sidebar" [class.sidebar-open]="sidebarVisible">
    <div class="sidebar-header">
      <h3>ERP Sandra</h3>
      <button pButton type="button" icon="pi pi-times" class="p-button-text p-button-rounded" (click)="sidebarVisible = false"></button>
    </div>
    <p-menu [model]="menuItems" class="sidebar-menu"></p-menu>
  </div>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" [class.active]="sidebarVisible" (click)="sidebarVisible = false"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Header -->
    <div class="header">
      <button pButton type="button" icon="pi pi-bars" class="p-button-text menu-toggle" (click)="sidebarVisible = true"></button>
      <h2>Gestión de Usuarios</h2>
      <div class="header-actions">
        <button pButton type="button" label="Editar Perfil" icon="pi pi-user-edit" class="p-button-outlined" (click)="editProfile()"></button>
        <button pButton type="button" label="Cerrar Sesión" icon="pi pi-sign-out" class="p-button-outlined" (click)="logout()"></button>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Users CRUD -->
      <p-card class="crud-card">
        <ng-template pTemplate="header">
          <div class="card-header">
            <h3>Usuarios</h3>
            <p-button label="Nuevo Usuario" icon="pi pi-plus" (onClick)="openNewUser()"></p-button>
          </div>
        </ng-template>
        <p-table [value]="users" responsiveLayout="scroll">
          <ng-template pTemplate="header">
            <tr>
              <th scope="col">Nombre de Usuario</th>
              <th scope="col">Correo Electrónico</th>
              <th scope="col">Nombre Completo</th>
              <th scope="col">Teléfono</th>
              <th scope="col">Acciones</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-user>
            <tr>
              <td>{{ user.username }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.fullName }}</td>
              <td>{{ user.phone }}</td>
              <td>
                <p-button icon="pi pi-pencil" (onClick)="editUser(user)"></p-button>
                <p-button icon="pi pi-trash" class="p-button-danger" (onClick)="deleteUser(user)"></p-button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>
  </div>
</div>

<!-- User Dialog -->
<p-dialog [(visible)]="userDialog" [style]="{width: '450px'}" header="Usuario" modal="true">
  <form [formGroup]="userForm">
    <div class="field">
      <label for="user-username">Nombre de Usuario</label>
      <input pInputText id="user-username" formControlName="username" required>
    </div>
    <div class="field">
      <label for="user-email">Correo Electrónico</label>
      <input pInputText id="user-email" formControlName="email" required>
    </div>
    <div class="field">
      <label for="user-fullName">Nombre Completo</label>
      <input pInputText id="user-fullName" formControlName="fullName" required>
    </div>
    <div class="field">
      <label for="user-address">Dirección</label>
      <input pInputText id="user-address" formControlName="address">
    </div>
    <div class="field">
      <label for="user-dob">Fecha de Nacimiento</label>
      <input pInputText id="user-dob" formControlName="dob">
    </div>
    <div class="field">
      <label for="user-phone">Teléfono</label>
      <input pInputText id="user-phone" formControlName="phone">
    </div>
    <div class="field">
      <label for="user-password">Contraseña</label>
      <input pInputText id="user-password" type="password" formControlName="password">
    </div>
  </form>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" class="p-button-text" (onClick)="userDialog = false"></p-button>
    <p-button label="Guardar" icon="pi pi-check" (onClick)="saveUser()"></p-button>
  </ng-template>
</p-dialog>

<p-toast></p-toast>
